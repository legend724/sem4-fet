<!DOCTYPE html>
<html>
<head>
  <title>RCB Jersey Shop</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    .box {
      margin-top: 50px;
    }

    img {
      width: 250px;
      border-radius: 10px;
    }

    button {
      background: red;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 18px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: darkred;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>RCB Jersey</h1>

    <img src="https://via.placeholder.com/250x300.png?text=RCB+Jersey" alt="RCB Jersey">

    <h2>Price: ₹999</h2>

    <button onclick="buyNow()">Buy Now</button>
  </div>

  <script>
    function buyNow() {
      alert("RCB Jersey Added to Cart!");
    }
  </script>

</body>
</html>

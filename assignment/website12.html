<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RCB Jersey Store</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#111;
      color:white;
    }

    header{
      background:#c40000;
      padding:20px;
      text-align:center;
    }

    header h1{
      font-size:40px;
    }

    nav{
      background:#000;
      padding:15px;
      text-align:center;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin:0 20px;
      font-size:18px;
    }

    .hero{
      height:400px;
      background:url('https://images.unsplash.com/photo-1521412644187-c49fa049e84d?q=80&w=1200&auto=format&fit=crop') center/cover;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    .hero h2{
      font-size:50px;
      background:rgba(0,0,0,0.6);
      padding:20px;
      border-radius:10px;
    }

    .products{
      padding:50px 20px;
      display:flex;
      justify-content:center;
      gap:30px;
      flex-wrap:wrap;
    }

    .card{
      background:#1e1e1e;
      width:300px;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.5);
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .card img{
      width:100%;
      height:300px;
      object-fit:cover;
    }

    .card-content{
      padding:20px;
      text-align:center;
    }

    .price{
      color:gold;
      font-size:24px;
      margin:10px 0;
    }

    button{
      background:#c40000;
      color:white;
      border:none;
      padding:12px 25px;
      font-size:16px;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover{
      background:red;
    }

    footer{
      background:#000;
      text-align:center;
      padding:20px;
      margin-top:40px;
    }
  </style>
</head>

<body>

  <header>
    <h1>RCB Jersey Store</h1>
    <p>Official Fan Collection 2026</p>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Players</a>
    <a href="#">Contact</a>
  </nav>

  <section class="hero">
    <h2>Buy Your Favorite RCB Jersey</h2>
  </section>

  <section class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1517466787929-bc90951d0974?q=80&w=800&auto=format&fit=crop" alt="RCB Jersey">

      <div class="card-content">
        <h2>RCB Home Jersey</h2>
        <p>Premium quality fan edition jersey.</p>
        <div class="price">₹1,999</div>

        <button onclick="buyNow()">
          Buy Now
        </button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?q=80&w=800&auto=format&fit=crop" alt="RCB Jersey">

      <div class="card-content">
        <h2>RCB Special Edition</h2>
        <p>Limited edition 2026 jersey.</p>
        <div class="price">₹2,499</div>

        <button onclick="buyNow()">
          Buy Now
        </button>
      </div>
    </div>

  </section>

  <footer>
    <p>© 2026 RCB Jersey Store | Made for Fans ❤️</p>
  </footer>

  <script>
    function buyNow() {
      alert("Thank you for choosing RCB Jersey!");
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>RCB Official Jersey Store</title>

  <style>
    body{
      font-family: Arial;
      text-align:center;
      background:#0a0a0a;
      color:white;
      margin:0;
    }

    header{
      background:red;
      padding:20px;
      font-size:24px;
      font-weight:bold;
    }

    .card{
      margin-top:40px;
    }

    img{
      width:250px;
      border-radius:10px;
    }

    button{
      padding:12px 25px;
      background:#e10600;
      color:white;
      border:none;
      font-size:18px;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover{
      background:darkred;
    }
  </style>
</head>

<body>

  <header>RCB Official Jersey Store</header>

  <div class="card">
    <img src="https://shop.royalchallengers.com/cdn/shop/files/RCB_JERSEY.jpg" alt="RCB Jersey">

    <h2>Official RCB Jersey</h2>
    <h3>Price: ₹1,499</h3>

    <button onclick="buyNow()">Buy Now</button>
  </div>

  <script>
    function buyNow(){
      window.location.href = "https://www.royalchallengers.com/";
    }
  </script>

</body>
</html>

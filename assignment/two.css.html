<!DOCTYPE html>
<html>
<head>
<title>Technical Skills</title>
<style>
  body {
    background: rgb(25,50,50); /* blue background */
    color: white;
    font-family: Arial, sans-serif;
    text-align: center; /* Centers h2 and other text */
  }

  h2 {
    text-align: center;
  }

  /* Center the list block while keeping text left-aligned inside it */
  ol {
    display: table; /* Acts like a block that fits its content */
    margin: 0 auto; /* Centers the table */
    text-align: left; /* Keeps the list items left-aligned */
  }
</style>
</head>
<body>

<h2>Technical Skill Matrix</h2>

<ol>
  <li> <strong>Software Development</strong>
    <ul>
      <li>C</li>
      <li>Java</li>
      <li>Python</li>
    </ul>
  </li>
  <li> <strong>Database Systems</strong>
    <ul>
      <li>SQL</li>
    </ul>
  </li>
</ol>

</body>
</html>

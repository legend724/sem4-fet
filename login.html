<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }
        .container{
            width: 400px;
            margin: 80px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        h2{
            text-align: center;
        }
        input, textarea{
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button{
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
        button:hover{
            background: #45a049;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Contact / Login Form</h2>

    <form>
        <label>First Name</label>
        <input type="text" name="fname" placeholder="Enter first name" required>

        <label>Last Name</label>
        <input type="text" name="lname" placeholder="Enter last name" required>

        <label>Email</label>
        <input type="email" name="email" placeholder="Enter email" required>

        <label>Subject</label>
        <input type="text" name="subject" placeholder="Enter subject">

        <label>Description</label>
        <textarea name="description" rows="4" placeholder="Write description..."></textarea>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
